name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: 844572228725.dkr.ecr.us-east-1.amazonaws.com/frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            844572228725.dkr.ecr.us-east-1.amazonaws.com/frontend:${{ github.sha }}
            844572228725.dkr.ecr.us-east-1.amazonaws.com/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for backend-js
        id: meta-backend-js
        uses: docker/metadata-action@v5
        with:
          images: 844572228725.dkr.ecr.us-east-1.amazonaws.com/backend-js
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push backend-js image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-js
          file: ./backend-js/Dockerfile
          push: true
          tags: |
            844572228725.dkr.ecr.us-east-1.amazonaws.com/backend-js:${{ github.sha }}
            844572228725.dkr.ecr.us-east-1.amazonaws.com/backend-js:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for backend-py
        id: meta-backend-py
        uses: docker/metadata-action@v5
        with:
          images: 844572228725.dkr.ecr.us-east-1.amazonaws.com/backend-py
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push backend-py image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-py
          file: ./backend-py/Dockerfile
          push: true
          tags: |
            844572228725.dkr.ecr.us-east-1.amazonaws.com/backend-py:${{ github.sha }}
            844572228725.dkr.ecr.us-east-1.amazonaws.com/backend-py:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ecs:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Fill in the new image IDs in the Amazon ECS task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v2
        with:
          task-definition: task-definition.json
          container-name: frontend
          image: 844572228725.dkr.ecr.us-east-1.amazonaws.com/frontend:${{ github.sha }}

      - name: Fill in the new image IDs for backend-js
        id: render-task-definition-backend-js
        uses: aws-actions/amazon-ecs-render-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          container-name: backend-js
          image: 844572228725.dkr.ecr.us-east-1.amazonaws.com/backend-js:${{ github.sha }}

      - name: Fill in the new image IDs for backend-py
        id: render-task-definition-backend-py
        uses: aws-actions/amazon-ecs-render-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition-backend-js.outputs.task-definition }}
          container-name: backend-py
          image: 844572228725.dkr.ecr.us-east-1.amazonaws.com/backend-py:${{ github.sha }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition-backend-py.outputs.task-definition }}
          service: examen-devops-service
          cluster: examen-devops-cluster
          wait-for-service-stability: true

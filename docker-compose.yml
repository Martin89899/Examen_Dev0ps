version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: backendjs_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - app-network

  backend-js:
    build:
      context: ./backend-js
      dockerfile: Dockerfile
    container_name: backend-js
    ports:
      - "8081:8081"
    environment:
      DB_HOST: examen-mysql-db.ctifppb2qt2m.us-east-1.rds.amazonaws.com
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Duoc.2026
      DB_NAME: backendjs_db
    depends_on:
      - mysql-db
    networks:
      - app-network

  backend-py:
    build:
      context: ./backend-py
      dockerfile: Dockerfile
    container_name: backend-py
    ports:
      - "8082:8082"
    environment:
      DB_HOST: examen-mysql-db.ctifppb2qt2m.us-east-1.rds.amazonaws.com
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Duoc.2026
      DB_NAME: backendpy_db
    depends_on:
      - mysql-db
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "8080:80"
    environment:
      BACKEND_USERS_URL: http://backend-js:8081
      BACKEND_PRODUCTS_URL: http://backend-py:8082
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
